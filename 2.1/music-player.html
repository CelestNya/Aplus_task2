<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音乐播放器</title>
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            background: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        .player-card {
            width: 375px;
            height: 667px;
            background: #1a1a22;
            border-radius: 32px;
            padding: 32px 28px 40px;
            display: flex;
            flex-direction: column;
        }

        .now-playing {
            text-align: center;
            font-size: 18px;
            font-weight: 500;
            color: #b0b0b8;
            margin-bottom: 32px;
            line-height: 1;
        }

        .album-cover {
            width: 240px;
            height: 240px;
            margin: 0 auto 36px;
            border-radius: 20px;
            background: linear-gradient(135deg, #7c3aed 0%, #ec4899 45%, #f97316 85%, #f59e0b 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            flex-shrink: 0;
            position: relative;
        }

        .vinyl {
            width: 90px;
            height: 90px;
            background: #4c1616;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .vinyl::before {
            content: '';
            width: 28px;
            height: 28px;
            background: #0f172a;
            border-radius: 50%;
            position: absolute;
        }

        .song-title {
            font-size: 30px;
            font-weight: 700;
            color: #ffffff;
            text-align: center;
            margin-bottom: 10px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .song-artist-album {
            font-size: 16px;
            font-weight: 400;
            color: #a1a1aa;
            text-align: center;
            margin-bottom: 32px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .progress-section {
            margin-bottom: 32px;
        }

        .time-display {
            display: flex;
            justify-content: space-between;
            font-size: 16px;
            font-weight: 500;
            color: #a1a1aa;
            margin-bottom: 12px;
        }

        .progress-container {
            width: calc(100% - 0px);
            height: 6px;
            background: #33333b;
            border-radius: 3px;
            position: relative;
            cursor: default;
        }

        .progress-fill {
            height: 100%;
            background: #8b5cf6;
            border-radius: 3px;
            width: 0%;
            position: relative;
        }

        .progress-thumb {
            width: 20px;
            height: 20px;
            background: #ffffff;
            border-radius: 50%;
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            cursor: default;
            left: 0;
        }

        .controls-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 30px;
            margin-bottom: 36px;
        }

        .control-btn {
            background: none;
            border: none;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0;
        }

        .prev-btn, .next-btn {
            width: 36px;
            height: 36px;
        }

        .prev-btn svg, .next-btn svg {
            width: 36px;
            height: 36px;
            stroke: #d4d4d8;
            stroke-width: 2;
            fill: none;
        }

        .play-btn {
            width: 70px;
            height: 70px;
            background: #8b5cf6;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .play-btn svg {
            width: 28px;
            height: 28px;
            stroke: #ffffff;
            stroke-width: 2;
            fill: none;
        }

        .volume-section {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .volume-icon {
            width: 20px;
            height: 20px;
            stroke: #a1a1aa;
            stroke-width: 2;
            fill: none;
            flex-shrink: 0;
        }

        .volume-container {
            flex: 1;
            height: 6px;
            background: #33333b;
            border-radius: 3px;
            position: relative;
            cursor: pointer;
        }

        .volume-fill {
            height: 100%;
            background: #8b5cf6;
            border-radius: 3px;
            width: 80%;
        }

        .no-audio-message {
            color: #666;
            font-size: 14px;
            text-align: center;
            padding: 20px;
        }
    </style>
</head>
<body>
    <div class="player-card">
        <div class="now-playing">正在播放</div>

        <div class="album-cover">
            <div class="vinyl"></div>
        </div>

        <div class="song-title" id="songTitle">暂无音频</div>
        <div class="song-artist-album" id="songArtistAlbum">- · -</div>

        <div class="progress-section">
            <div class="time-display">
                <span id="currentTime">00:00</span>
                <span id="totalTime">00:00</span>
            </div>
            <div class="progress-container" id="progressContainer">
                <div class="progress-fill" id="progressFill"></div>
                <div class="progress-thumb" id="progressThumb"></div>
            </div>
        </div>

        <div class="controls-section">
            <button class="control-btn prev-btn" id="prevBtn" aria-label="上一曲">
                <svg viewBox="0 0 24 24">
                    <polyline points="19 20 9 12 19 4"></polyline>
                    <line x1="5" y1="19" x2="5" y2="5"></line>
                </svg>
            </button>
            <button class="control-btn play-btn" id="playBtn" aria-label="播放">
                <svg viewBox="0 0 24 24" id="playIcon">
                    <polygon points="5 3 19 12 5 21"></polygon>
                </svg>
            </button>
            <button class="control-btn next-btn" id="nextBtn" aria-label="下一曲">
                <svg viewBox="0 0 24 24">
                    <polyline points="5 4 15 12 5 20"></polyline>
                    <line x1="19" y1="5" x2="19" y2="19"></line>
                </svg>
            </button>
        </div>

        <div class="volume-section">
            <svg class="volume-icon" viewBox="0 0 24 24">
                <polygon points="11 5 6 9 2 9 2 15 6 15 11 19"></polygon>
            </svg>
            <div class="volume-container" id="volumeContainer">
                <div class="volume-fill" id="volumeFill"></div>
            </div>
            <svg class="volume-icon" viewBox="0 0 24 24">
                <polygon points="11 5 6 9 2 9 2 15 6 15 11 19"></polygon>
                <path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path>
                <path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path>
            </svg>
        </div>
    </div>

    <audio id="audio" preload="metadata"></audio>

    <script>
        let isPlaying = false;
        let currentTrackIndex = 0;
        let trackList = [];
        let isDragging = false;
        let volume = 0.8;

        const audio = document.getElementById('audio');
        const songTitle = document.getElementById('songTitle');
        const songArtistAlbum = document.getElementById('songArtistAlbum');
        const currentTimeEl = document.getElementById('currentTime');
        const totalTimeEl = document.getElementById('totalTime');
        const progressContainer = document.getElementById('progressContainer');
        const progressFill = document.getElementById('progressFill');
        const progressThumb = document.getElementById('progressThumb');
        const playBtn = document.getElementById('playBtn');
        const playIcon = document.getElementById('playIcon');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const volumeContainer = document.getElementById('volumeContainer');
        const volumeFill = document.getElementById('volumeFill');

        function formatTime(seconds) {
            if (isNaN(seconds) || seconds < 0) seconds = 0;
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return String(mins).padStart(2, '0') + ':' + String(secs).padStart(2, '0');
        }

        function updatePlayIcon() {
            if (isPlaying) {
                playIcon.innerHTML = '<rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect>';
            } else {
                playIcon.innerHTML = '<polygon points="5 3 19 12 5 21"></polygon>';
            }
        }

        function loadTrack(index) {
            if (trackList.length === 0) return;
            currentTrackIndex = index;
            const track = trackList[index];
            audio.src = '/music/' + track.file;
            songTitle.textContent = track.title;
            songArtistAlbum.textContent = track.artist + ' · ' + track.album;
            audio.currentTime = 0;
            updateProgress();
        }

        function updateProgress() {
            if (audio.duration) {
                const percent = audio.duration ? audio.currentTime / audio.duration : 0;
                const containerWidth = progressContainer.getBoundingClientRect().width;
                const thumbLeft = Math.max(0, percent * containerWidth - 10);

                if (!isDragging) {
                    progressFill.style.width = (percent * 100) + '%';
                    progressThumb.style.left = thumbLeft + 'px';
                    currentTimeEl.textContent = formatTime(audio.currentTime);
                }
                totalTimeEl.textContent = formatTime(audio.duration);
            }
        }

        function playPause() {
            if (trackList.length === 0) return;
            if (isPlaying) {
                audio.pause();
            } else {
                audio.play();
            }
            isPlaying = !isPlaying;
            updatePlayIcon();
        }

        function prevTrack() {
            if (trackList.length === 0) return;
            let newIndex = currentTrackIndex - 1;
            if (newIndex < 0) newIndex = trackList.length - 1;
            loadTrack(newIndex);
            if (isPlaying) audio.play();
        }

        function nextTrack() {
            if (trackList.length === 0) return;
            let newIndex = currentTrackIndex + 1;
            if (newIndex >= trackList.length) newIndex = 0;
            loadTrack(newIndex);
            if (isPlaying) audio.play();
        }

        function updateVolume(e) {
            const rect = volumeContainer.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const percent = Math.max(0, Math.min(1, x / rect.width));
            volume = percent;
            audio.volume = volume;
            volumeFill.style.width = (volume * 100) + '%';
        }

        function startVolumeDrag(e) {
            e.preventDefault();
            updateVolume(e.touches ? e.touches[0] : e);
            document.addEventListener('mousemove', onVolumeDrag);
            document.addEventListener('mouseup', endVolumeDrag);
            document.addEventListener('touchmove', onVolumeDrag);
            document.addEventListener('touchend', endVolumeDrag);
        }

        function onVolumeDrag(e) {
            e.preventDefault();
            updateVolume(e.touches ? e.touches[0] : e);
        }

        function endVolumeDrag() {
            document.removeEventListener('mousemove', onVolumeDrag);
            document.removeEventListener('mouseup', endVolumeDrag);
            document.removeEventListener('touchmove', onVolumeDrag);
            document.removeEventListener('touchend', endVolumeDrag);
        }

        function updateProgressFromEvent(e) {
            const rect = progressContainer.getBoundingClientRect();
            const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
            const percent = Math.max(0, Math.min(1, x / rect.width));
            const thumbLeft = Math.max(0, percent * rect.width - 10);

            if (audio.duration) {
                audio.currentTime = percent * audio.duration;
                progressFill.style.width = (percent * 100) + '%';
                progressThumb.style.left = thumbLeft + 'px';
                currentTimeEl.textContent = formatTime(audio.currentTime);
            }
        }

        function startDrag(e) {
            if (trackList.length === 0) return;
            e.preventDefault();
            isDragging = true;
            audio.pause();
            updateProgressFromEvent(e);
            document.addEventListener('mousemove', onDrag);
            document.addEventListener('mouseup', endDrag);
            document.addEventListener('touchmove', onDrag, { passive: false });
            document.addEventListener('touchend', endDrag);
        }

        function onDrag(e) {
            if (!isDragging) return;
            e.preventDefault();
            updateProgressFromEvent(e);
        }

        function endDrag() {
            isDragging = false;
            document.removeEventListener('mousemove', onDrag);
            document.removeEventListener('mouseup', endDrag);
            document.removeEventListener('touchmove', onDrag);
            document.removeEventListener('touchend', endDrag);
            updateProgress();
            if (isPlaying) audio.play();
        }

        audio.addEventListener('timeupdate', updateProgress);
        audio.addEventListener('seeked', updateProgress);
        audio.addEventListener('loadedmetadata', () => {
            totalTimeEl.textContent = formatTime(audio.duration);
        });
        audio.addEventListener('ended', () => {
            nextTrack();
        });

        playBtn.addEventListener('click', playPause);
        prevBtn.addEventListener('click', prevTrack);
        nextBtn.addEventListener('click', nextTrack);

        progressContainer.addEventListener('mousedown', (e) => e.preventDefault());
        progressContainer.addEventListener('touchstart', (e) => {
            e.preventDefault();
        }, { passive: false });

        volumeContainer.addEventListener('mousedown', startVolumeDrag);
        volumeContainer.addEventListener('touchstart', (e) => {
            e.preventDefault();
            startVolumeDrag(e);
        }, { passive: false });

        audio.volume = volume;
        volumeFill.style.width = (volume * 100) + '%';

        fetch('/api/list')
            .then(res => res.json())
            .then(data => {
                trackList = data;
                if (trackList.length > 0) {
                    loadTrack(0);
                } else {
                    songTitle.textContent = '暂无音频';
                    songArtistAlbum.textContent = '当前目录无音频文件';
                }
            })
            .catch(() => {
                songTitle.textContent = '获取歌曲列表失败';
                songArtistAlbum.textContent = '请检查服务器连接';
            });
    </script>
</body>
</html>
